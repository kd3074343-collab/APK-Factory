name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Find ZIP File
        id: zip
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            ls -la
            exit 1
          fi

          echo "ZIP=$ZIP_FILE" >> $GITHUB_ENV

      - name: Extract ZIP
        run: |
          mkdir project
          unzip "$ZIP" -d project

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Find Gradle Project
        run: |
          PROJECT_DIR=$(dirname "$(find project -name "settings.gradle.kts" -o -name "settings.gradle" | head -n 1)")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Make Gradle Wrapper Executable
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew || true

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            project/**/build/outputs/apk/debug/*.apk
