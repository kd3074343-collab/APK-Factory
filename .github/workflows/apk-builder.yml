name: Build SocialsApp APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download Repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          mkdir project
          unzip "$ZIP" -d project
          echo "APP_DIR=$(find project -name 'package.json' -exec dirname {} \; | head -1)" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Packages
        run: |
          cd "$APP_DIR"
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Website
        run: |
          cd "$APP_DIR"
          npm run build

      - name: Fix Capacitor Config
        run: |
          cd "$APP_DIR"
          cat > capacitor.config.json <<EOF
          {
            "appId": "com.socials.app",
            "appName": "SocialsApp",
            "webDir": "dist"
          }
          EOF

      - name: Sync Android
        run: |
          cd "$APP_DIR"
          npx cap sync android

      - name: Build APK
        run: |
          cd "$APP_DIR/android"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SocialsApp-APK
          path: "**/app/build/outputs/apk/debug/*.apk"
