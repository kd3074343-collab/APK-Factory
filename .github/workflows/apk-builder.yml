name: APK Factory

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Download Code
      uses: actions/checkout@v4

    - name: Find and unzip app
      run: |
        ZIP=$(find . -name "*.zip" | head -1)
        unzip "$ZIP" -d project

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create Firebase ENV
      run: |
        APP_DIR=$(find project -name "settings.gradle.kts" -exec dirname {} \; | head -1)
        cd "$APP_DIR"
        echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" > .env
        echo "FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }}" >> .env
        echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env

    - name: Create Debug Key
      run: |
        APP_DIR=$(find project -name "settings.gradle.kts" -exec dirname {} \; | head -1)
        cd "$APP_DIR"
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build APK
      run: |
        APP_DIR=$(find project -name "gradlew" -exec dirname {} \; | head -1)
        cd "$APP_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SocialsApp-Pro-APK
        path: "**/app/build/outputs/apk/debug/*.apk"
  
