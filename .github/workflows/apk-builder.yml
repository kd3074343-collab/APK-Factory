name: Universal Android APK Builder

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          mkdir project
          find . -maxdepth 1 -name "*.zip" -exec unzip -o {} -d project \;

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Find Android Project
        run: |
          PROJECT=$(find project -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -1)

          if [ -z "$PROJECT" ]; then
            PROJECT=$(find project -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | head -1)
          fi

          if [ -z "$PROJECT" ]; then
            echo "Android project not found!"
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

          echo "Project Directory:"
          echo "$PROJECT_DIR"

      - name: Show Project Files
        run: |
          cd "$PROJECT_DIR"
          pwd
          ls -la

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            echo "Using Gradle Wrapper"
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace --no-daemon
          else
            echo "Gradle Wrapper not found."
            echo "Using System Gradle."
            gradle clean
            gradle assembleDebug --stacktrace --no-daemon
          fi

      - name: Find APK
        run: |
          find project -type f -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: |
            project/**/build/outputs/**/*.apk
            project/**/*.apk
