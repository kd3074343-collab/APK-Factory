name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          mkdir project
          ZIPFILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          unzip "$ZIPFILE" -d project

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Create Debug Keystore
        run: |
          mkdir -p ~/.android

          keytool -genkeypair \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

          echo "========== SHA1 =========="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey | grep SHA1

      - name: Find Android Project
        run: |
          PROJECT_DIR=$(dirname "$(find project -name "settings.gradle.kts" | head -n 1)")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Copy Debug Keystore
        run: |
          cp ~/.android/debug.keystore "$PROJECT_DIR/debug.keystore"
          cp ~/.android/debug.keystore "$PROJECT_DIR/custom_debug.keystore"

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew || true
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Find APK
        run: |
          find project -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            project/**/build/outputs/apk/**/*.apk
            project/**/*.apk
