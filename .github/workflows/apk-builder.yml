name: Build APK From ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip tic-tac-toe-online.zip -d project

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Find Android Project
        run: |
          PROJECT_DIR=$(dirname "$(find project -name settings.gradle.kts | head -n 1)")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Grant Permission
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
