name: Build SocialsApp APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download Repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          mkdir project
          unzip "$ZIP" -d project
          echo "APP_DIR=$(find project -name 'settings.gradle*' -exec dirname {} \; | head -1)" >> $GITHUB_ENV

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Fix Android Project
        run: |
          cd "$APP_DIR"

          sed -i 's/RepositoriesMode.FAIL_ON_PROJECT_REPOS/RepositoriesMode.PREFER_SETTINGS/g' settings.gradle || true

          if ! grep -q "namespace" app/build.gradle; then
            sed -i '/android {/a\    namespace "com.socials.app"' app/build.gradle
          fi

          sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@drawable\/ic_launcher"/g' app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' app/src/main/AndroidManifest.xml

          mkdir -p app/src/main/res/drawable

          cat > app/src/main/res/drawable/ic_launcher.xml <<EOF
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#00A884"
                  android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF

      - name: Build APK
        run: |
          cd "$APP_DIR"
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SocialsApp-APK
          path: "**/app/build/outputs/apk/debug/*.apk"
