name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          mkdir project
          unzip "*.zip" -d project

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Find Android Project
        run: |
          PROJECT_DIR=$(dirname "$(find project -name "settings.gradle.kts" | head -n 1)")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project: $PROJECT_DIR"

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew --version
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Find APK
        run: |
          find project -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            project/**/build/outputs/apk/**/*.apk
            project/**/*.apk
